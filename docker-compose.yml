services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "5500:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./deploy/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
